# ============================================
# Feature 详细设计 - OpenAPI 3.0 模板
# ============================================
# 使用说明：
# 1. 替换 {FeatureName}、{feature}、{entity} 为实际名称
# 2. 根据业务需求调整 schema 定义
# 3. 确保所有错误响应都有明确定义
# ============================================

openapi: 3.0.3
info:
  title: {FeatureName} API
  description: |
    {Feature} 功能的 RESTful API 接口定义。

    ## 认证方式
    所有接口（除登录外）都需要在请求头中携带 JWT Token：
    ```
    Authorization: Bearer <token>
    ```

    ## 错误码说明
    - 2000: 成功
    - 4000: 请求参数错误
    - 4001: 参数校验失败
    - 4010: 未认证
    - 4011: Token过期
    - 4030: 权限不足
    - 4040: 资源不存在
    - 4090: 资源冲突（如重复创建）
    - 4290: 请求过于频繁
    - 5000: 服务器内部错误
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: /api/v1
    description: API v1

# ============================================
# 安全定义
# ============================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token认证

  # ============================================
  # 复用Schema定义
  # ============================================
  schemas:
    # 基础响应结构
    BaseResponse:
      type: object
      properties:
        code:
          type: integer
          example: 2000
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true
      required:
        - code
        - message

    # 分页响应结构
    PageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
      required:
        - items
        - total
        - page
        - page_size

    # {实体}创建请求
    {Entity}Create:
      type: object
      properties:
        name:
          type: string
          description: 名称
          example: "示例名称"
          maxLength: 255
        code:
          type: string
          description: 编码
          example: "CODE_001"
          pattern: '^[A-Z0-9_]+$'
        status:
          type: string
          description: 状态
          enum: ['active', 'inactive']
          default: 'active'
        metadata:
          type: object
          description: 扩展字段
          additionalProperties: true
      required:
        - name

    # {实体}更新请求
    {Entity}Update:
      type: object
      properties:
        name:
          type: string
          description: 名称
          maxLength: 255
        status:
          type: string
          description: 状态
          enum: ['active', 'inactive']
        metadata:
          type: object
          description: 扩展字段
      # 更新时所有字段都是可选的

    # {实体}响应
    {Entity}Response:
      type: object
      properties:
        id:
          type: integer
          description: ID
          example: 1
        name:
          type: string
          description: 名称
        code:
          type: string
          description: 编码
        status:
          type: string
          description: 状态
        metadata:
          type: object
          description: 扩展字段
        created_at:
          type: string
          format: date-time
          description: 创建时间
        updated_at:
          type: string
          format: date-time
          description: 更新时间
      required:
        - id
        - name
        - status
        - created_at
        - updated_at

    # 错误响应
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 4000
        message:
          type: string
          description: 错误信息
          example: "请求参数错误"
        details:
          type: object
          description: 详细错误信息（可选）
          nullable: true

    # 字段校验错误
    ValidationError:
      type: object
      properties:
        code:
          type: integer
          example: 4001
        message:
          type: string
          example: "参数校验失败"
        details:
          type: object
          properties:
            fields:
              type: object
              description: 各字段错误信息
              example:
                name: "名称不能为空"
                code: "编码格式不正确"

# ============================================
# API 路径定义
# ============================================
paths:
  # ----------------------------------------
  # 列表查询 & 创建
  # ----------------------------------------
  /{features}:
    get:
      summary: 查询列表
      description: 支持分页、过滤、排序
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码（从1开始）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: 状态过滤
          schema:
            type: string
            enum: ['active', 'inactive']
        - name: keyword
          in: query
          description: 关键词搜索（名称模糊匹配）
          schema:
            type: string
        - name: sort_by
          in: query
          description: 排序字段
          schema:
            type: string
            enum: ['created_at', 'updated_at', 'name']
            default: 'created_at'
        - name: sort_order
          in: query
          description: 排序方向
          schema:
            type: string
            enum: ['asc', 'desc']
            default: 'desc'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PageResponse'
                          - properties:
                              items:
                                type: array
                                items:
                                  $ref: '#/components/schemas/{Entity}Response'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: 创建
      description: 创建新的 {实体}
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/{Entity}Create'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/{Entity}Response'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 资源冲突（如编码重复）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ----------------------------------------
  # 详情查询 & 更新 & 删除
  # ----------------------------------------
  /{features}/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: {实体}ID
        schema:
          type: integer

    get:
      summary: 查询详情
      description: 根据ID查询 {实体} 详情
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/{Entity}Response'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: 更新
      description: 更新 {实体} 信息
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/{Entity}Update'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/{Entity}Response'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: 删除
      description: 删除 {实体}（软删除）
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ----------------------------------------
  # 批量操作（可选）
  # ----------------------------------------
  /{features}/batch:
    post:
      summary: 批量创建
      description: 批量创建 {实体}
      tags:
        - {Feature}
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/{Entity}Create'
              required:
                - items
      responses:
        '200':
          description: 批量创建结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          success_count:
                            type: integer
                            description: 成功数量
                          failed_count:
                            type: integer
                            description: 失败数量
                          failed_items:
                            type: array
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: 失败项索引
                                error:
                                  type: string
                                  description: 错误信息

# ============================================
# 标签分组（可选）
# ============================================
tags:
  - name: {Feature}
    description: {Feature} 相关接口
